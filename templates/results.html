<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Results</title>
  </head>
  <body>
    <a href="/">← back</a>
    <h1>Results for "{{ keyword }}"</h1>

    {% if error %}
      <p style="color:red;">{{ error }}</p>
    {% endif %}

    <p>{{ jobs|length }} jobs found.</p>

    <ul>
      {% for job in jobs %}
        <li>
          <strong>{{ job.position }}</strong>
          {% if job.company %} - {{ job.company }}{% endif %}
          ({{ job.source }}) -
          <a href="{{ job.link }}" target="_blank">apply</a>
        </li>
      {% endfor %}
    </ul>
  </body>
</html>
