<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Job Scraper</title>
  </head>
  <body>
    <h1>Job Scraper</h1>
    <p>Search for: python / javascript / java ...</p>

    <form action="/search">
      <input name="keyword" placeholder="python" required />
      <button>Search</button>
    </form>

    <p>Static pages generated: 
      <a href="/search?keyword=python">python</a> ·
      <a href="/search?keyword=javascript">javascript</a> ·
      <a href="/search?keyword=java">java</a>
    </p>
  </body>
</html>
